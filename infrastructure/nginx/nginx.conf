# ============================================================
# AirLynk — NGINX Reverse Proxy Configuration
# ============================================================
# Responsibilities (INFRASTRUCTURE.md §3):
#   - Request routing to FastAPI
#   - Security headers
#   - Request size limiting (10 MB — API_SPEC.md §Maximum Payload)
#   - Rate limiting zone
#   - Gzip compression
# ============================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # --- Logging -----------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # --- Rate Limiting (SECURITY.md §4) ------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # --- Performance -------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # --- Compression -------------------------------------------------------
    gzip on;
    gzip_types application/json text/plain application/xml;
    gzip_min_length 256;

    # --- Request Size Limit (API_SPEC.md: 10 MB) --------------------------
    client_max_body_size 10m;

    # --- Upstream -----------------------------------------------------------
    upstream api_backend {
        server api:8000;
    }

    # --- Server Block -------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Security headers (SECURITY.md §4, SECURITY_STANDARDS.md §4)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Hide NGINX version
        server_tokens off;

        # --- API routes (rate limited) -------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # --- Auth routes (stricter rate limit) -----------------------------
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # --- Health check (public, no rate limit) --------------------------
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # --- Readiness probe -----------------------------------------------
        location /ready {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # --- Metrics (internal only) ---------------------------------------
        location /metrics {
            # In production, restrict to internal networks
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # --- OpenAPI docs (development only) --------------------------------
        location /docs {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }
    }
}
