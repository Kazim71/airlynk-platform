# AirLynk — Alembic Configuration
# See: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = backend/alembic
sqlalchemy.url = postgresql+asyncpg://airlynk:airlynk_dev_password@localhost:5432/airlynk

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
