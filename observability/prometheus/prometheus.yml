# ============================================================
# AirLynk — Prometheus Configuration
# ============================================================
# Scrape targets from OBSERVABILITY_PLAN.md §3
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- AirLynk API metrics -----------------------------------------------
  - job_name: "airlynk-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "airlynk-api"
          environment: "development"

  # --- Prometheus self-monitoring ----------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
